name: Test

on:
  push:
    paths:
      - 'grammar.js'
      - 'test/corpus/**'
      - 'src/scanner.c'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm install
      - run: tree-sitter test
      - run: make
